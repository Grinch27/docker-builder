name: Download to Artifact
# https://docs.github.com/zh/actions/reference/workflows-and-actions/workflow-syntax
# https://docs.github.com/zh/actions/reference/workflows-and-actions/expressions

on:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - .github/workflows/download_artifact.yml
  workflow_dispatch:
    inputs:
      file_url:
        description: "URL to Download"
        type: string
        required: true
        default: "https://dl.google.com/chrome/install/ChromeStandaloneSetup64.exe"
      toggle_compress:
        description: "to Compress"
        type: boolean
        required: false
        default: false
      toggle_split:
        description: "to Split"
        type: boolean
        required: false
        default: false

run-name: Download to Artifact

jobs:
  download:
    name: Download to Artifact
    runs-on: ubuntu-latest
    permissions: write-all
    defaults:
      run:
        shell: bash
    container:
      image: ubuntu:devel
      # 按官方文档允许的字段，尽量给满 GHA 可传递的容器运行权限
      options: >-
        --privileged
        --user=0:0
        --pid=host
        --ipc=host
        --uts=host
        --cgroupns=host
        --cap-add=ALL
        --security-opt apparmor=unconfined
        --security-opt seccomp=unconfined
      volumes:
        - /dev:/dev
        - /sys:/sys:ro
        - /sys/fs/cgroup:/sys/fs/cgroup
        - /run/udev:/run/udev:ro
        - /lib/modules:/lib/modules:ro
    env:
      DEBIAN_FRONTEND: noninteractive
      FORCE_UNSAFE_CONFIGURE: "1"
      # ========= Workspace Environment Variables ==========
      compress: true
      PATH_output: "/output"
    steps:
      - name: Masked file URL
        id: mask-url
        uses: actions/github-script@main
        with:
          script: |
            const fileUrl = context.payload.inputs.file_url
            core.setSecret(fileUrl)
            core.exportVariable('FILE_URL', fileUrl)

      # - name: Set File URL
      #   run: |
      #     echo -e "::add-mask::${{ github.event.inputs.file_url }}"
      #     echo -e "FILE_URL=${{ github.event.inputs.file_url }}" >> $GITHUB_ENV

      - name: Install Tools
        id: apt-download
        working-directory: /
        run: |
          echo -e "Current working directory: $(pwd)"
          ls -lh ./
          echo -e "========== Checkin Container =========="
          run_root() {
            if command -v sudo >/dev/null 2>&1; then
              sudo "$@"
            else
              "$@"
            fi
          }
          run_root apt-get -yqq update
          run_root apt-get -yqq install aria2 ca-certificates curl xz-utils
          aria2c --version
          curl --version
          xz --version

      - name: Resolve File Name
        id: file-info
        if: ${{ success() }}
        working-directory: /
        run: |
          mkdir -p ${{ env.PATH_output }}
          cd "${{ env.PATH_output }}"
          echo -e "Current working directory: $(pwd)"
          ls -lh ./
          echo -e "# ========== Mask File =========="
          probe_headers="$(mktemp)"
          trap 'rm -f "${probe_headers}"' EXIT
          FILE_NAME=""
          probe_url="$(curl -fsSLI -D "${probe_headers}" -o /dev/null -w '%{url_effective}' "${FILE_URL}" || true)"
          content_disposition="$({ awk 'BEGIN { IGNORECASE = 1 } /^Content-Disposition:/ { sub(/\r$/, ""); print; exit }' "${probe_headers}"; } || true)"

          if [[ "${content_disposition}" == *"filename*="* ]]; then
            FILE_NAME="${content_disposition#*filename*=}"
            FILE_NAME="${FILE_NAME#UTF-8''}"
            FILE_NAME="${FILE_NAME%%;*}"
            if [[ "${FILE_NAME}" == *%* ]]; then
              printf -v FILE_NAME '%b' "${FILE_NAME//%/\\x}"
            fi
          elif [[ "${content_disposition}" == *'filename="'* ]]; then
            FILE_NAME="${content_disposition#*filename=\"}"
            FILE_NAME="${FILE_NAME%%\"*}"
          elif [[ "${content_disposition}" == *"filename="* ]]; then
            FILE_NAME="${content_disposition#*filename=}"
            FILE_NAME="${FILE_NAME%%;*}"
          fi

          if [[ -z "${FILE_NAME}" ]]; then
            # fallback_url="${probe_url:-${FILE_URL}}"
            fallback_url="${FILE_URL}"
            fallback_url="${fallback_url%%\?*}"
            fallback_url="${fallback_url%%\#*}"
            FILE_NAME="$(basename "${fallback_url}")"
          fi

          if [[ -z "${FILE_NAME}" || "${FILE_NAME}" == "/" || "${FILE_NAME}" == "." ]]; then
            FILE_NAME="${{ job.check_run_id }}"
          fi
          echo -e "::add-mask::$FILE_NAME"

          {
            echo "FILE_NAME=${FILE_NAME}"
          } | tee -a "${GITHUB_OUTPUT}"

      - name: Download with aria2
        id: aria2-download
        if: ${{ steps.file-info.conclusion == 'success' }}
        continue-on-error: ${{ fromJSON('true') }}
        timeout-minutes: ${{ fromJSON('180') }}
        env:
          FILE_NAME: ${{ steps.file-info.outputs.FILE_NAME }}
          INTERVAL_LOG: 1
        working-directory: "${{ env.PATH_output }}"
        run: |
          echo -e "Current working directory: $(pwd)"
          ls -lh ./
          # https://aria2.github.io/manual/en/html/aria2c.html
          echo -e "========== Download File with aria2 =========="
          # --header="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/132.0.6980.95 Safari/537.36" \
          # debug, info, notice, warn, error
          aria2c \
            --summary-interval=${INTERVAL_LOG} \
            --console-log-level=notice \
            --human-readable \
            --continue=true \
            --max-tries=3 \
            --retry-wait=1 \
            --timeout=30 \
            --connect-timeout=15 \
            --remote-time \
            --file-allocation=falloc \
            --stream-piece-selector=geom \
            --enable-http-keep-alive \
            --enable-http-pipelining \
            --allow-overwrite=true \
            --auto-file-renaming=false \
            --dir="${{ env.PATH_output }}" \
            --out="${FILE_NAME}" \
            --bt-tracker="https://raw.githubusercontent.com/ngosang/trackerslist/master/trackers_all.txt" \
            --enable-dht \
            --enable-dht6 \
            --bt-max-peers=0 \
            --bt-require-crypto \
            --follow-torrent=mem \
            "${FILE_URL}"
          ls -lh ./

      - name: Download with curl
        id: curl-download
        if: ${{ failure() && steps.aria2-download.conclusion == 'failure' }}
        continue-on-error: true
        timeout-minutes: 180
        env:
          FILE_NAME: ${{ steps.file-info.outputs.FILE_NAME }}
        working-directory: "${{ env.PATH_output }}"
        run: |
          echo -e "Current working directory: $(pwd)"
          ls -lh ./
          echo -e "========== Download File with curl =========="
          curl \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 1 \
            --retry-max-time 30 \
            --connect-timeout 15 \
            -C - \
            --http2 \
            -L \
            --fail-with-body \
            --progress-bar \
            --create-dirs \
            -o "${FILE_NAME}" \
            "${FILE_URL}"
          ls -lh ./

      - name: Compress Artifact
        id: compress-artifact
        if: ${{ inputs.toggle_compress }}
        uses: Grinch27/github-actions/.github/actions/compress-xz@main
        with:
          path_target: ${{ env.PATH_output }}
          pattern_match: ".*"
          mem_hold: "2048"
          memlimit: "4GiB"

      - name: Split Artifact
        id: split-artifact
        if: ${{ inputs.toggle_split }}
        uses: Grinch27/github-actions/.github/actions/file-split@main
        with:
          path_target: ${{ env.PATH_output }}
          pattern_match: '^\./[^/]+\.xz$'
          split_size: "699M"
          split_threshold: "700000000"

      - name: Upload Artifact
        id: upload-artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ steps.file-info.outputs.FILE_NAME }}
          path: "${{ env.PATH_output }}/**"
          retention-days: 1
