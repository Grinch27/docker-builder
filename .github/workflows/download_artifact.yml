name: Download File to Artifact
# https://docs.github.com/zh/actions/reference/workflows-and-actions/workflow-syntax

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "URL to download"
        type: string
        required: true
        default: "https://dl.google.com/chrome/install/ChromeStandaloneSetup64.exe"

run-name: Download File to Artifact

jobs:
  download:
    name: Download File to Artifact
    runs-on: ubuntu-latest
    permissions: write-all
    defaults:
      run:
        shell: bash
    container:
      image: ubuntu:devel
      # 按官方文档允许的字段，尽量给满 GHA 可传递的容器运行权限
      options: >-
        --privileged
        --user=0:0
        --pid=host
        --ipc=host
        --uts=host
        --cgroupns=host
        --cap-add=ALL
        --security-opt apparmor=unconfined
        --security-opt seccomp=unconfined
      volumes:
        - /dev:/dev
        - /sys:/sys:ro
        - /sys/fs/cgroup:/sys/fs/cgroup
        - /run/udev:/run/udev:ro
        - /lib/modules:/lib/modules:ro
    env:
      DEBIAN_FRONTEND: noninteractive
      FORCE_UNSAFE_CONFIGURE: "1"
      # ========= Workspace Environment Variables ==========
      compress: true
      PATH_output: "/output"
    steps:
      - name: Masked file URL
        id: mask-url
        uses: actions/github-script@main
        with:
          script: |
            const fileUrl = context.payload.inputs.file_url
            core.setSecret(fileUrl)
            core.exportVariable('FILE_URL', fileUrl)

      # - name: Set File URL
      #   run: |
      #     echo -e "::add-mask::${{ github.event.inputs.file_url }}"
      #     echo -e "FILE_URL=${{ github.event.inputs.file_url }}" >> $GITHUB_ENV

      - name: Install Tools
        id: apt-download
        working-directory: /
        run: |
          echo -e "Current working directory: $(pwd)"
          ls -lh ./

          run_root() {
            if command -v sudo >/dev/null 2>&1; then
              sudo "$@"
            else
              "$@"
            fi
          }
          run_root apt-get -yqq update
          run_root apt-get -yqq install ca-certificates curl xz-utils
          curl --version
          xz --version

      - name: Download
        id: file-download
        working-directory: /
        run: |
          mkdir -p ${{ env.PATH_output }}
          cd "${{ env.PATH_output }}"
          echo -e "Current working directory: $(pwd)"
          ls -lh ./

          # ========== Mask File ==========
          probe_headers="$(mktemp)"
          trap 'rm -f "${probe_headers}"' EXIT

          FILE_NAME=""
          probe_url="$(curl -fsSLI -D "${probe_headers}" -o /dev/null -w '%{url_effective}' "${FILE_URL}" || true)"
          content_disposition="$({ awk 'BEGIN { IGNORECASE = 1 } /^Content-Disposition:/ { sub(/\r$/, ""); print; exit }' "${probe_headers}"; } || true)"

          if [[ "${content_disposition}" == *"filename*="* ]]; then
            FILE_NAME="${content_disposition#*filename*=}"
            FILE_NAME="${FILE_NAME#UTF-8''}"
            FILE_NAME="${FILE_NAME%%;*}"
            if [[ "${FILE_NAME}" == *%* ]]; then
              printf -v FILE_NAME '%b' "${FILE_NAME//%/\\x}"
            fi
          elif [[ "${content_disposition}" == *'filename="'* ]]; then
            FILE_NAME="${content_disposition#*filename=\"}"
            FILE_NAME="${FILE_NAME%%\"*}"
          elif [[ "${content_disposition}" == *"filename="* ]]; then
            FILE_NAME="${content_disposition#*filename=}"
            FILE_NAME="${FILE_NAME%%;*}"
          fi

          if [[ -z "${FILE_NAME}" ]]; then
            fallback_url="${probe_url:-${FILE_URL}}"
            fallback_url="${fallback_url%%\?*}"
            fallback_url="${fallback_url%%\#*}"
            FILE_NAME="$(basename "${fallback_url}")"
          fi

          if [[ -z "${FILE_NAME}" || "${FILE_NAME}" == "/" || "${FILE_NAME}" == "." ]]; then
            FILE_NAME="${{ job.check_run_id }}"
          fi
          echo -e "::add-mask::$FILE_NAME"

          # ========== Download File ==========
          echo -e "Downloading file"
          curl \
            --retry 3 \
            --retry-all-errors \
            -C - \
            --http2 \
            -L \
            --fail-with-body \
            --progress-bar \
            --create-dirs \
            -o "${FILE_NAME}" \
            "${FILE_URL}"

          ls -lh ./

          {
            echo "FILE_NAME=${FILE_NAME}"
          } | tee -a "${GITHUB_OUTPUT}"

      - name: Compress
        id: file-compress
        uses: Grinch27/github-actions/.github/actions/compress-xz@main
        with:
          path_target: ${{ env.PATH_output }}
          pattern_match: ".*"
          split_size: "1999M"
          split_threshold: "2000000000"
          mem_hold: "2048"
          memlimit: "4GiB"

      - name: Upload Artifact
        id: file-artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ steps.file-download.outputs.FILE_NAME }}
          path: "${{ env.PATH_output }}/*"
          retention-days: 1
