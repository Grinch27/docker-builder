name: Monitor Images

run-name: Monitor Images

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "Generate a build matrix for all tracked build targets"
        type: choice
        required: false
        default: "false"
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Matrices
    runs-on: ubuntu-latest
    outputs:
      version_matrix: ${{ steps.prepare.outputs.version_matrix }}
      build_targets: ${{ steps.prepare.outputs.build_targets }}
      force_build: ${{ steps.prepare.outputs.force_build }}
    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@main

      - name: Prepare matrix data
        id: prepare
        run: |
          set -e

          apps_json=$(find application -mindepth 1 -maxdepth 1 -type d -printf '%f\n' \
            | grep -v '^\.example$' \
            | sort \
            | jq -R -s 'split("\n") | map(select(length > 0))')

          version_matrix=$(jq -c '{include: map({app_branch: ., tag_repo: "latest", custom_env: "", runner_image: "ubuntu-latest"})}' <<< "${apps_json}")

          build_targets_static=$(cat <<'JSON'
          {
            "include": [
              {"app_branch": "cloudflare-warp", "tag_repo": "latest", "custom_env": "", "runner_image": "ubuntu-latest"},
              {"app_branch": "adguardvpn-cli", "tag_repo": "nightly", "custom_env": "build_arg='update_channel=nightly'", "runner_image": "ubuntu-latest"},
              {"app_branch": "adguardvpn-cli", "tag_repo": "beta", "custom_env": "build_arg='update_channel=beta'", "runner_image": "ubuntu-latest"},
              {"app_branch": "adguardvpn-cli", "tag_repo": "release", "custom_env": "build_arg='update_channel=release'", "runner_image": "ubuntu-latest"},
              {"app_branch": "expressvpn", "tag_repo": "latest", "custom_env": "", "runner_image": "ubuntu-latest"},
              {"app_branch": "nordvpn", "tag_repo": "latest", "custom_env": "", "runner_image": "ubuntu-latest"},
              {"app_branch": "squid", "tag_repo": "latest", "custom_env": "", "runner_image": "ubuntu-latest"},
              {"app_branch": "vlmcsd", "tag_repo": "latest", "custom_env": "", "runner_image": "ubuntu-latest"},
              {"app_branch": "novnc", "tag_repo": "latest", "custom_env": "", "runner_image": "ubuntu-latest"},
              {"app_branch": "baidunetdisk", "tag_repo": "dev", "custom_env": "", "runner_image": "ubuntu-latest"},
              {"app_branch": "steamcmd", "tag_repo": "dev", "custom_env": "", "runner_image": "ubuntu-latest"},
              {"app_branch": "runner", "tag_repo": "dev", "custom_env": "", "runner_image": "ubuntu-latest"},
              {"app_branch": "runner", "tag_repo": "slim", "custom_env": "dockerfile=slim.Dockerfile", "runner_image": "ubuntu-latest"},
              {"app_branch": "runner", "tag_repo": "actions", "custom_env": "dockerfile=actions.Dockerfile", "runner_image": "ubuntu-latest"},
              {"app_branch": "runner", "tag_repo": "actions-slim", "custom_env": "dockerfile=actions-slim.Dockerfile", "runner_image": "ubuntu-latest"},
              {"app_branch": "openwrt", "tag_repo": "main", "custom_env": "", "runner_image": "ubuntu-latest"},
              {"app_branch": "privoxy", "tag_repo": "latest", "custom_env": "", "runner_image": "ubuntu-latest"},
              {"app_branch": "aria2", "tag_repo": "latest", "custom_env": "", "runner_image": "ubuntu-latest"},
              {"app_branch": "samba", "tag_repo": "latest", "custom_env": "", "runner_image": "ubuntu-latest"},
              {"app_branch": "samba", "tag_repo": "alpine", "custom_env": "dockerfile=alpine.Dockerfile", "runner_image": "ubuntu-latest"},
              {"app_branch": "dnscrypt-proxy", "tag_repo": "latest", "custom_env": "", "runner_image": "ubuntu-latest"},
              {"app_branch": "sdnext", "tag_repo": "latest", "custom_env": "", "runner_image": "ubuntu-latest"},
              {"app_branch": "sdnext-dev", "tag_repo": "dev", "custom_env": "build_arg='therock_version=7.11.0,therock_release_type=stable,therock_amdgpu_family=gfx110X-all'", "runner_image": "ubuntu-latest"}
            ]
          }
          JSON
          )

          known_apps=$(jq -r '.include[].app_branch' <<< "${build_targets_static}" | sort -u | jq -R -s 'split("\n") | map(select(length > 0))')
          missing_apps=$(jq -n --argjson all "${apps_json}" --argjson known "${known_apps}" '$all - $known')
          missing_targets=$(jq -c '{include: map({app_branch: ., tag_repo: "latest", custom_env: "", runner_image: "ubuntu-latest"})}' <<< "${missing_apps}")

          build_targets=$(jq -c --argjson base "${build_targets_static}" --argjson extra "$(jq '.include' <<< "${missing_targets}")" '{include: ($base.include + $extra)}')
          force_build="${{ inputs.force_build || 'false' }}"

          {
            echo "version_matrix<<__JSON__"
            echo "${version_matrix}"
            echo "__JSON__"
            echo "build_targets<<__JSON__"
            echo "${build_targets}"
            echo "__JSON__"
            echo "force_build=${force_build}"
          } >> "$GITHUB_OUTPUT"

  fetch-versions:
    name: Fetch ${{ matrix.app_branch }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.version_matrix).include }}
    uses: ./.github/workflows/callable-fetch-app-version.yml
    with:
      app_branch: ${{ matrix.app_branch }}
      tag_repo: ${{ matrix.tag_repo }}
      custom_env: ${{ matrix.custom_env || '' }}
      runner_image: ${{ matrix.runner_image || 'ubuntu-latest' }}

  monitor:
    name: Render Monitor State
    runs-on: ubuntu-latest
    needs: [prepare, fetch-versions]
    outputs:
      changed_count: ${{ steps.monitor.outputs.changed_count }}
      changed_apps: ${{ steps.monitor.outputs.changed_apps }}
      changed_build_matrix: ${{ steps.monitor.outputs.changed_build_matrix }}
      readme_changed: ${{ steps.monitor.outputs.readme_changed }}
    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@main

      - name: Download app version artifacts
        uses: actions/download-artifact@main
        with:
          path: /tmp/app-version-artifacts
          pattern: app-version-*
          merge-multiple: true

      - name: Render monitor outputs and update README
        id: monitor
        env:
          BUILD_TARGETS: ${{ needs.prepare.outputs.build_targets }}
          FORCE_BUILD: ${{ needs.prepare.outputs.force_build }}
          MONITOR_OUTPUT: /tmp/monitor-output
        run: |
          set -e
          python3 scripts/ci/monitor_state.py \
            --artifact-root /tmp/app-version-artifacts \
            --readme-path README.md \
            --output-dir "${MONITOR_OUTPUT}" \
            --build-targets-json "${BUILD_TARGETS}" \
            --force-build "${FORCE_BUILD}" \
            --workflow-name ".github/workflows/monitor-images.yml"

          changed_count=$(jq '.include | length' "${MONITOR_OUTPUT}/build-matrix.json")
          changed_apps=$(jq -c . "${MONITOR_OUTPUT}/changed-apps.json")
          changed_build_matrix=$(jq -c . "${MONITOR_OUTPUT}/build-matrix.json")
          readme_changed=$(cat "${MONITOR_OUTPUT}/readme_changed.txt")

          echo "changed_count=${changed_count}" >> "$GITHUB_OUTPUT"
          echo "changed_apps=${changed_apps}" >> "$GITHUB_OUTPUT"
          {
            echo "changed_build_matrix<<__JSON__"
            echo "${changed_build_matrix}"
            echo "__JSON__"
          } >> "$GITHUB_OUTPUT"
          echo "readme_changed=${readme_changed}" >> "$GITHUB_OUTPUT"

      - name: Upload monitor artifacts
        uses: actions/upload-artifact@main
        with:
          name: monitor-output
          path: |
            /tmp/monitor-output/build-matrix.json
            /tmp/monitor-output/monitor-state.json
            /tmp/monitor-output/monitor-report.md
            /tmp/monitor-output/versions.json
          retention-days: 7

      - name: Commit README updates
        if: ${{ steps.monitor.outputs.readme_changed == 'true' }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "ci: update stable container version matrix in README"
          git push
