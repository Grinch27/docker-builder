# NOTE(agent): 需要你确认是否将本地 registry 地址抽成 workflow input；当前固定 registry_local 为 127.0.0.1:5000，避免把容器网络别名泄漏给 daemon/build.sh；本地探活、本地 skopeo inspect 和远端 push 都改为通过 Docker helper 容器在 daemon 网络里完成。
# NOTE(agent): 后续研究方向，可把 build-docker.yml 与本文件重复的 metadata、buildx、local registry 启动逻辑提取成可复用 action，减少双份维护。
# NOTE(agent): 可优化点，如果希望 custom_env 同时影响 build/test/push 步骤，需要补一个统一写入 GITHUB_ENV 的加载步骤；当前它主要用于 meta-app 容器内脚本。
# NOTE(agent): 可优化点，建议逐步统一 application/*/build/build.sh 的默认值和变量引用风格，向 sdnext 系列脚本靠拢，减少某个应用脚本缺省变量时的脆弱性。
# NOTE(agent): 可优化点，如果本地 registry 在 GitHub-hosted runner 上仍不稳定，可评估改为 oci/tar 输出加 docker load 的链路，减少对临时 registry 的依赖。
name: (Docker) Build Docker

permissions:
  contents: write

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      app_branch:
        description: "App Branch"
        type: string
        required: true
        default: "sdnext-dev"
      tag_repo:
        description: "Tag Push to Repo"
        type: string
        required: true
        default: "dev"
      force_push:
        description: "Force push to Docker Hub"
        type: choice
        required: false
        default: "false"
        options:
          - "true"
          - "false"
      custom_env:
        description: "Custom env: key=value;key=value"
        type: string
        required: false
        default: ""
      runner_image:
        description: "Runner Image"
        type: string
        required: false
        default: "ubuntu-latest"
  workflow_call:
    inputs:
      app_branch:
        description: "App Branch"
        required: true
        type: string
      tag_repo:
        description: "Tag Push to Repo"
        required: true
        type: string
      force_push:
        description: "Force push to Docker Hub"
        required: true
        type: string
      custom_env:
        description: "Custom env: key=value;key=value"
        required: false
        type: string
      runner_image:
        description: "Runner Image"
        required: false
        type: string
    secrets:
      DOCKER_USERNAME:
        description: "Docker Hub Username"
        required: true
      DOCKER_PASSWORD:
        description: "Docker Hub Password"
        required: true

run-name: ${{ inputs.app_branch }} - ${{ inputs.tag_repo }}

env:
  custom_env: ${{ inputs.custom_env || '' }}

jobs:
  build:
    name: ${{ inputs.app_branch }} - ${{ inputs.tag_repo }}
    runs-on: ${{ inputs.runner_image || 'ubuntu-latest' }}
    permissions: write-all
    defaults:
      run:
        shell: bash
    container:
      image: ubuntu:devel
      # 按官方文档允许的字段，尽量给满 GHA 可传递的容器运行权限
      options: >-
        --privileged
        --user=0:0
        --pid=host
        --ipc=host
        --uts=host
        --cgroupns=host
        --cap-add=ALL
        --security-opt apparmor=unconfined
        --security-opt seccomp=unconfined
      volumes:
        - /dev:/dev
        - /sys:/sys:ro
        - /sys/fs/cgroup:/sys/fs/cgroup
        - /run/udev:/run/udev:ro
        - /lib/modules:/lib/modules:ro
    env:
      DEBIAN_FRONTEND: noninteractive
      FORCE_UNSAFE_CONFIGURE: "1"
      # ========= Toolchain Environment Variables ==========
      # ----- gcc -----
      gcc_purge: false
      gcc_install: false
      gcc_switch: false
      gcc_version: ""
      gcc_aarch64: false
      # ----- clang -----
      clang_purge: false
      clang_install: false
      clang_switch: false
      clang_version: ""
      # ----- jdk -----
      jdk_purge: false
      jdk_install: false
      jdk_switch: false
      jdk_version: ""
      # ----- docker -----
      docker_install: true
      qemu_install: false
      # ========= Workspace Environment Variables ==========
      app_branch: "${{ inputs.app_branch }}"
      tag_repo: "${{ inputs.tag_repo || 'latest' }}"
      force_push: "${{ inputs.force_push || 'false' }}"
      registry_push: "docker.io"
      registry_local: "127.0.0.1:5000"
      registry_local_probe: "http://127.0.0.1:5000/v2/"
      registry_container_name: "registry-local"
      registry_network_name: "host"
      buildkit_network: "host"
      compress: "true"
      dir_app: "application/${{ inputs.app_branch }}"
      REPO_self: "https://github.com/${{ github.repository }}"
      REPO_self_branch: "${{ github.ref_name || 'main' }}"
      PATH_build: "/builder"
      PATH_output: "/builder/output"
      PATH_backup: "/builder/backup"
      PATH_self: "/builder/self"
      PATH_metadata: "/builder/metadata"
      PATH_app: "/builder/self/application/${{ inputs.app_branch }}"
      PATH_metadata_image: "/builder/metadata/metadata_image.json"
      PATH_metadata_app: "/builder/metadata/metadata_app.json"
      PATH_metadata_sum: "/builder/metadata/metadata_sum.json"
      PATH_docker_data: "/builder/docker-data"
      PATH_release: "/builder/release.md"
    steps:
      # ========== Pre: Settings ==========
      - name: (Var) environment variable setup
        id: var-setup
        working-directory: /
        run: |
          echo -e "Current working directory: $(pwd)"

          env_vars=(
            "app_branch"
            "tag_repo"
            "registry_local"
            "registry_local_probe"
            "registry_container_name"
            "registry_network_name"
            "buildkit_network"
            "dir_app"
            "PATH_app"
            "PATH_build"
            "PATH_output"
            "PATH_backup"
            "PATH_self"
            "PATH_metadata"
            "PATH_metadata_image"
            "PATH_metadata_app"
            "PATH_metadata_sum"
            "PATH_docker_data"
            "PATH_release"
          )
          for var in "${env_vars[@]}"; do
            echo "${var}=${!var}" | tee -a "$GITHUB_ENV"
          done

      # ========== General Environment Setup: Start ==========
      - name: Docker Workspace All in One
        id: docker-workspace
        uses: Grinch27/github-actions/.github/actions/env-indocker@main

      - name: (Setup) Workspace directories
        id: setup-paths
        working-directory: /
        run: |
          echo -e "Current working directory: $(pwd)"

          dirs=(
            "${PATH_build}"
            "${PATH_output}"
            "${PATH_backup}"
            "${PATH_metadata}"
            "${PATH_docker_data}"
            "$(dirname "${PATH_release}")"
          )
          for dir in "${dirs[@]}"; do
            mkdir -p "${dir}"
          done

          ls -ld "${dirs[@]}"

      - name: Clone self
        id: clone-self
        working-directory: /
        run: |
          echo -e "Current working directory: $(pwd)"

          rm -rf "${PATH_self}"
          mkdir -p "${PATH_self}"

          git clone "${REPO_self}" "${PATH_self}" --single-branch --depth=1 --branch="${REPO_self_branch}"
          echo -e "REPO_self: [ ${REPO_self} ]\nBRANCH: [ ${REPO_self_branch} ]"

          df -hT "${PWD}"

      - name: (Env) Load .env files
        id: env-app
        working-directory: ${{ env.PATH_app }}
        run: |
          echo "Current working directory: $(pwd)"

          shopt -s nullglob
          env_dir="./env"
          if [[ -d "${env_dir}" ]]; then
            for env_file in "${env_dir}"/*.env; do
              echo "Loading env file: ${env_file}"
              awk -F= '/^[a-zA-Z_][a-zA-Z0-9_]*=/ {printf "%s=%s\n", $1, $2}' "${env_file}" | tee -a "$GITHUB_ENV"
            done
          else
            echo "No directory found: ${env_dir}"
          fi

      - name: (Env) Validate app settings
        id: env-validate
        working-directory: /
        run: |
          echo -e "Current working directory: $(pwd)"

          required_vars=(
            "repo_dockerhub"
            "base_image"
            "arch_branch"
            "registry_local"
          )
          for var in "${required_vars[@]}"; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::Missing required environment variable: ${var}"
              exit 1
            fi
          done

          compress_value=$(echo "${compress:-true}" | tr '[:upper:]' '[:lower:]')
          if [[ "${compress_value}" != "true" ]]; then
            compress_value="false"
          fi
          time_sleep_value="${time_sleep:-3}"
          registry_local_probe_value="http://${registry_local}/v2/"

          echo "compress=${compress_value}" | tee -a "$GITHUB_ENV"
          echo "time_sleep=${time_sleep_value}" | tee -a "$GITHUB_ENV"
          echo "registry_local_probe=${registry_local_probe_value}" | tee -a "$GITHUB_ENV"

          echo "arch_branch=${arch_branch}" | tee -a "$GITHUB_OUTPUT"
          echo "repo_dockerhub=${repo_dockerhub}" | tee -a "$GITHUB_OUTPUT"
          echo "base_image=${base_image}" | tee -a "$GITHUB_OUTPUT"
          echo "compress=${compress_value}" | tee -a "$GITHUB_OUTPUT"

      - name: (Apt) install packages - Docker
        id: apt-docker
        working-directory: /
        run: |
          echo -e "Current working directory: $(pwd)"

          packages_install=(
            "jq"
            "skopeo"
            "xz-utils"
          )
          apt-get -yqq update
          set +e
          for pkg in "${packages_install[@]}"; do
            apt-get -yqq install "$pkg" || echo "Skip missing package: $pkg"
          done
          set -e
          apt-get -yqq autoremove --purge
          apt-get -yqq clean
          systemctl daemon-reload || true

      - name: (Setup) Docker Data Root
        id: setup-docker-root
        working-directory: /
        run: |
          echo "Current working directory: $(pwd)"

          mkdir -p "${PATH_docker_data}"
          registry_loopback="127.0.0.1:5000"
          registry_alias="localhost:5000"
          registry_container_host="${registry_container_name}:5000"

          daemon_file="/etc/docker/daemon.json"
          temp_file=$(mktemp)
          if test -s "${daemon_file}"; then
            jq \
              --arg root "${PATH_docker_data}" \
              --arg registry_local "${registry_local}" \
              --arg registry_loopback "${registry_loopback}" \
              --arg registry_alias "${registry_alias}" \
              --arg registry_container_host "${registry_container_host}" \
              '. + {"data-root": $root}
              | .["insecure-registries"] = (((.["insecure-registries"] // []) + [$registry_local, $registry_alias, $registry_loopback, $registry_container_host]) | unique)' \
              "${daemon_file}" > "${temp_file}"
          else
            jq -n \
              --arg root "${PATH_docker_data}" \
              --arg registry_local "${registry_local}" \
              --arg registry_loopback "${registry_loopback}" \
              --arg registry_alias "${registry_alias}" \
              --arg registry_container_host "${registry_container_host}" \
              '{"data-root": $root, "insecure-registries": ([$registry_local, $registry_alias, $registry_loopback, $registry_container_host] | unique)}' > "${temp_file}"
          fi
          cp "${temp_file}" "${daemon_file}"

          service docker restart || service docker start || true
          if ! docker info >/dev/null 2>&1; then
            nohup dockerd --host=unix:///var/run/docker.sock >/tmp/dockerd.log 2>&1 &
          fi

          for _ in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for Docker daemon..."
            sleep 2
          done

          docker info --format 'DockerRootDir={{ .DockerRootDir }}'

      - name: (Setup) Local registry route
        id: registry-route
        working-directory: /
        run: |
          echo "Current working directory: $(pwd)"

          echo "Use host-network route for daemon-facing local registry access."
          echo "registry_local=${registry_local}" | tee -a "${GITHUB_ENV}"
          echo "registry_local_probe=${registry_local_probe}" | tee -a "${GITHUB_ENV}"
          echo "registry_network_name=host" | tee -a "${GITHUB_ENV}"
          echo "buildkit_network=host" | tee -a "${GITHUB_ENV}"
          echo "registry_container_name=${registry_container_name}" | tee -a "${GITHUB_ENV}"

          echo "registry_network_name=host" | tee -a "${GITHUB_OUTPUT}"
          echo "buildkit_network=host" | tee -a "${GITHUB_OUTPUT}"
          echo "registry_local=${registry_local}" | tee -a "${GITHUB_OUTPUT}"
          echo "registry_local_probe=${registry_local_probe}" | tee -a "${GITHUB_OUTPUT}"

      - name: (Setup) QEMU
        id: setup-qemu
        if: ${{ steps.env-validate.outputs.arch_branch != 'linux/amd64' }}
        working-directory: /
        run: |
          echo "Current working directory: $(pwd)"

          docker run --privileged --rm tonistiigi/binfmt --install all
          docker buildx version

      # ========== General Environment Setup: End ==========
      # ========== Metadata / Check: Start ==========
      - name: (MetaData) from DockerHub
        id: meta-image
        env:
          category: "repository"
        working-directory: /
        run: |
          echo "Current working directory: $(pwd)"

          inspect_image() {
            local repo="$1"
            local platform="$2"
            local os arch variant
            local -a inspect_cmd

            os=$(echo "${platform}" | cut -d'/' -f1)
            arch=$(echo "${platform}" | cut -d'/' -f2-)
            variant=""
            if echo "${arch}" | grep -q 'arm/v'; then
              variant=$(echo "${arch}" | cut -d'/' -f2)
              arch=$(echo "${arch}" | cut -d'/' -f1)
            fi

            inspect_cmd=(
              skopeo inspect
              --override-os="${os}"
              --override-arch="${arch}"
              --format=json
            )
            if [[ -n "${variant}" ]]; then
              inspect_cmd+=(--override-variant="${variant}")
            fi
            inspect_cmd+=("docker://docker.io/${repo}")

            if ! "${inspect_cmd[@]}" > /tmp/skopeo-inspect.json 2>/tmp/skopeo-inspect.log; then
              echo "::warning::Failed to inspect docker.io/${repo} for ${platform}"
              jq -n --arg name "${repo}" '{"Name": $name, "Layers": [], "Labels": {}}'
              return 0
            fi

            jq '.' /tmp/skopeo-inspect.json
          }

          metadata='{"${{ env.category }}":[]}'
          declare -a repo_array=("${base_image}" "${repo_dockerhub}:${tag_repo}")
          IFS=',' read -ra platforms <<< "${arch_branch}"
          for repo in "${repo_array[@]}"; do
            for platform in "${platforms[@]}"; do
              data_json=$(inspect_image "${repo}" "${platform}")
              metadata=$(jq \
                --argjson data "${data_json}" \
                --arg platform "${platform}" \
                --arg repo "${repo}" \
                '.${{ env.category }} += [{name: $repo, platform: $platform, data: $data}]' <<< "${metadata}")
            done
          done

          echo "${metadata}" | jq . > "${PATH_metadata_image}"
          echo "status=success" | tee -a "${GITHUB_OUTPUT}"

      - name: (Check) Layer MetaData ${{ steps.env-validate.outputs.base_image }} in ${{ steps.env-validate.outputs.repo_dockerhub }}:${{ env.tag_repo }}
        id: check-layer
        if: steps.meta-image.outputs.status == 'success' && !cancelled()
        env:
          category_image: "repository"
        working-directory: /
        run: |
          changed=false
          metadata_image=$(cat "${PATH_metadata_image}")
          IFS=',' read -ra platforms <<< "${arch_branch}"
          for platform in "${platforms[@]}"; do
            base_json=$(echo "${metadata_image}" | jq --arg platform "${platform}" --arg repo "${base_image}" '
              .${{ env.category_image }}[] | select(.platform == $platform and .name == $repo) | .data
            ')
            repo_json=$(echo "${metadata_image}" | jq --arg platform "${platform}" --arg repo "${repo_dockerhub}:${tag_repo}" '
              .${{ env.category_image }}[] | select(.platform == $platform and .name == $repo) | .data
            ')

            echo -e "========== Base image: ${base_image} ${platform} ==========\n${base_json}"
            echo -e "========== Repo image: ${repo_dockerhub}:${tag_repo} ${platform} ==========\n${repo_json}"

            base_layers=$(jq '.Layers // []' <<< "${base_json}")
            repo_layers=$(jq '.Layers // []' <<< "${repo_json}")
            missing_layers=$(jq -n --argjson base "${base_layers}" --argjson repo "${repo_layers}" '$base - $repo')

            if [[ "$(echo "${missing_layers}" | jq 'length')" -eq 0 ]]; then
              echo "----- All layers are present in ${platform} -----"
            else
              echo -e "----- missing layers in ${platform} -----\n${missing_layers}"
              changed=true
              break
            fi
          done

          echo "changed=${changed}" | tee -a "${GITHUB_OUTPUT}"
          echo "status=success" | tee -a "${GITHUB_OUTPUT}"

      - name: (MetaData) ${{ env.app_branch }} in Container
        id: meta-app
        if: always() && !cancelled()
        env:
          container_name: "container-test"
          category: "platforms"
          dir_container: "/tmp"
        working-directory: ${{ env.PATH_app }}
        run: |
          echo "Current working directory: $(pwd)"

          metadata='{"${{ env.category }}":[]}'
          IFS=',' read -ra platforms <<< "${arch_branch}"
          for platform in "${platforms[@]}"; do
            echo "===== Testing Base Image for platform: ${platform} ====="
            docker pull --platform "${platform}" "${base_image}"
            docker rm -f "${container_name}" >/dev/null 2>&1 || true
            docker run \
              --name "${container_name}" \
              --rm \
              --detach \
              --platform "${platform}" \
              "${base_image}" \
              /bin/sh -c "uname -a && sleep infinity"

            log_container=$(mktemp)
            docker exec -u 0 "${container_name}" mkdir -p "${dir_container}"

            dir_step="meta-app"
            if [[ -d "${dir_step}" ]]; then
              shopt -s nullglob

              env_temp=$(mktemp)
              if [[ -n "${custom_env}" ]]; then
                echo "${custom_env}" | tr ';' '\n' | tee -a "${env_temp}"
                docker cp "${env_temp}" "${container_name}:${dir_container}/build.env"
              fi

              for script_file in "${dir_step}"/*.sh; do
                container_script="${dir_container}/$(basename "${script_file}")"
                script_temp=$(mktemp)
                {
                  echo "#!/bin/sh"
                  printenv | awk -F= '/^[a-zA-Z_][a-zA-Z0-9_]*=/ {printf "%s=\"%s\"\n", $1, $2}'
                  cat "${script_file}"
                } > "${script_temp}"

                docker cp "${script_temp}" "${container_name}:${container_script}"
                docker exec -u 0 "${container_name}" chmod +x "${container_script}"
                docker exec -u 0 "${container_name}" sh -c "${container_script}" | tee -a "${log_container}"
              done
            else
              echo "No directory found"
            fi

            docker stop "${container_name}" || true

            metadata=$(jq \
              --arg platform "${platform}" \
              --arg version "$(awk -F= '/^version=/ {print $2}' "${log_container}" | tail -n 1)" \
              '.${{ env.category }} += [{platform: $platform, version: $version}]' <<< "${metadata}")
          done

          echo "${metadata}" | jq . > "${PATH_metadata_app}"
          echo "status=success" | tee -a "${GITHUB_OUTPUT}"

      - name: (Check) Version of app
        id: check-version
        if: steps.meta-app.outputs.status == 'success' && !cancelled()
        env:
          category_image: "repository"
          category_app: "platforms"
        working-directory: /
        run: |
          changed=false
          metadata_image=$(cat "${PATH_metadata_image}")
          metadata_app=$(cat "${PATH_metadata_app}")
          IFS=',' read -ra platforms <<< "${arch_branch}"
          for platform in "${platforms[@]}"; do
            repo_json=$(echo "${metadata_image}" | jq --arg platform "${platform}" --arg repo "${repo_dockerhub}:${tag_repo}" '
              .${{ env.category_image }}[]
              | select(.platform == $platform and .name == $repo)
              | .data
            ')
            app_json=$(echo "${metadata_app}" | jq --arg platform "${platform}" '
              .${{ env.category_app }}[]
              | select(.platform == $platform)
            ')

            echo "repo_json=${repo_json}"
            echo "app_json=${app_json}"

            repo_labels=$(echo "${repo_json}" | jq '.Labels // {}')
            repo_version=$(echo "${repo_labels}" | jq -r '.version // empty')
            app_version=$(echo "${app_json}" | jq -r '.version // empty')
            if [[ -z "${repo_version}" || "${repo_version}" != "${app_version}" ]]; then
              echo "${platform} Version mismatch: repo_version=${repo_version}, app_version=${app_version}"
              changed=true
            else
              echo "${platform} Version match: repo_version=${repo_version}, app_version=${app_version}"
            fi
          done

          echo "changed=${changed}" | tee -a "${GITHUB_OUTPUT}"
          echo "status=success" | tee -a "${GITHUB_OUTPUT}"

      - name: Summary
        id: summary
        if: always() && !cancelled()
        env:
          category_app: "platforms"
          platform_prefer: "amd64"
        working-directory: /
        run: |
          metadata_app=$(cat "${PATH_metadata_app}" 2>/dev/null || echo '{"platforms":[]}')
          preferred_platform="linux/${platform_prefer}"

          if [[ "$(jq -r ".${category_app}[] | select(.version != null and .version != \"\") | .version" <<< "${metadata_app}" | sort -u | wc -l)" -ne 1 ]]; then
            version=$(jq -r ".${category_app}[] | select(.platform == \"${preferred_platform}\") | .version // empty" <<< "${metadata_app}" | head -n 1)
            if [[ -z "${version}" ]]; then
              version=$(jq -r ".${category_app}[] | .version // empty" <<< "${metadata_app}" | grep -m1 . || true)
            fi
            consistent=false
            echo "Versions are not consistent across ${arch_branch}, using ${preferred_platform} version: ${version}"
          else
            version=$(jq -r ".${category_app}[].version" <<< "${metadata_app}" | sort -u)
            consistent=true
            echo "Versions are consistent across ${arch_branch}, using unified version: ${version}"
          fi

          echo "version=${version}" | tee -a "${GITHUB_ENV}" | tee -a "${GITHUB_OUTPUT}"
          echo "consistent=${consistent}" | tee -a "${GITHUB_ENV}" | tee -a "${GITHUB_OUTPUT}"

          if [[ "${{ steps.check-layer.outputs.changed || 'true' }}" != 'true' ]] && \
            [[ "${{ steps.check-version.outputs.changed || 'true' }}" != 'true' ]] && \
            [[ "${force_push}" != 'true' ]]; then
            changed=false
          else
            changed=true
          fi
          echo "changed=${changed}" | tee -a "${GITHUB_OUTPUT}"

      # ========== Metadata / Check: End ==========
      # ========== Build / Publish: Start ==========
      - name: (Setup) Docker Buildx
        id: buildx
        if: steps.summary.outputs.changed == 'true' && !cancelled()
        working-directory: /
        run: |
          echo "Current working directory: $(pwd)"

          buildkitd_config=$(mktemp)
          declare -a registry_hosts=(
            "${registry_local}"
            "${registry_container_name}:5000"
            "127.0.0.1:5000"
            "localhost:5000"
          )
          seen_registry_hosts=$'\n'
          : > "${buildkitd_config}"
          for registry_host in "${registry_hosts[@]}"; do
            if [[ -z "${registry_host}" ]]; then
              continue
            fi
            if [[ "${seen_registry_hosts}" == *$'\n'"${registry_host}"$'\n'* ]]; then
              continue
            fi
            seen_registry_hosts+="${registry_host}"$'\n'
            printf '[registry."%s"]\n  http = true\n  insecure = true\n\n' "${registry_host}" >> "${buildkitd_config}"
          done

          docker buildx rm builder >/dev/null 2>&1 || true
          docker buildx create \
            --name builder \
            --driver docker-container \
            --driver-opt "network=${buildkit_network}" \
            --buildkitd-config "${buildkitd_config}" \
            --use
          docker buildx inspect --bootstrap

      - name: (Service) Local Registry
        id: registry
        if: steps.summary.outputs.changed == 'true' && !cancelled()
        working-directory: /
        run: |
          echo "Current working directory: $(pwd)"

          docker rm -f registry registry-local >/dev/null 2>&1 || true
          docker pull registry:latest
          docker pull curlimages/curl:8.12.1

          docker_run_args=(
            --name "${registry_container_name}"
            --detach
            --env REGISTRY_HTTP_ADDR=0.0.0.0:5000
          )
          if [[ "${registry_network_name}" == "host" ]]; then
            docker_run_args+=(--network host)
          else
            docker_run_args+=(
              --network "${registry_network_name}"
              --network-alias "${registry_container_name}"
            )
          fi
          docker run "${docker_run_args[@]}" registry:latest

          docker ps --filter "name=^/${registry_container_name}$" --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

          for _ in $(seq 1 30); do
            if docker run --rm --network host curlimages/curl:8.12.1 -fsS --connect-timeout 2 "${registry_local_probe}" >/dev/null; then
              echo "status=success" | tee -a "${GITHUB_OUTPUT}"
              exit 0
            fi

            echo "Waiting for local registry at ${registry_local_probe}"
            sleep 2
          done

          ss -lntp || true
          docker inspect "${registry_container_name}" || true
          docker logs "${registry_container_name}" || true
          echo "::error::Local registry is not reachable at ${registry_local_probe}"
          exit 1

      - name: Build and push to local registry
        id: build
        if: steps.summary.outputs.changed == 'true' && !cancelled()
        working-directory: ${{ env.PATH_app }}
        run: |
          echo "Current working directory: $(pwd)"

          dir_step="build"
          build_script="build.sh"
          if [[ -d "${dir_step}" ]]; then
            cd "./${dir_step}"
            echo "Changed to directory: $(pwd)"

            if [[ ! -f "${build_script}" ]]; then
              echo "Missing build script: ${build_script}"
              exit 1
            fi

            chmod +x "./${build_script}"
            sh "./${build_script}"
          else
            echo "No directory found"
          fi

          echo "status=success" | tee -a "${GITHUB_OUTPUT}"

      - name: (Inspect) Layers with skopeo
        id: inspect
        if: steps.build.outputs.status == 'success' && !cancelled()
        working-directory: ${{ env.PATH_app }}
        run: |
          echo "Current working directory: $(pwd)"

          registry_inspect_image="quay.io/skopeo/stable:latest"
          docker pull "${registry_inspect_image}"

          IFS=',' read -ra platforms <<< "${arch_branch}"
          for platform in "${platforms[@]}"; do
            os=$(echo "${platform}" | cut -d'/' -f1)
            arch=$(echo "${platform}" | cut -d'/' -f2-)
            variant=""
            if echo "${arch}" | grep -q 'arm/v'; then
              variant=$(echo "${arch}" | cut -d'/' -f2)
              arch=$(echo "${arch}" | cut -d'/' -f1)
            fi

            inspect_cmd=(
              docker run
              --rm
              --network host
              "${registry_inspect_image}"
              inspect
              --override-os="${os}"
              --override-arch="${arch}"
              --format=json
              --tls-verify=false
            )
            if [[ -n "${variant}" ]]; then
              inspect_cmd+=(--override-variant="${variant}")
            fi
            inspect_cmd+=("docker://${registry_local}/${repo_dockerhub}:${tag_repo}")

            "${inspect_cmd[@]}"
          done

          echo "status=success" | tee -a "${GITHUB_OUTPUT}"

      - name: (Test) Docker image
        id: test
        if: steps.build.outputs.status == 'success' && !cancelled()
        continue-on-error: true
        timeout-minutes: ${{ fromJSON('3') }}
        env:
          container_name: "container-test"
          dir_container: "/tmp"
        working-directory: ${{ env.PATH_app }}
        run: |
          echo "Current working directory: $(pwd)"

          IFS=',' read -ra platforms <<< "${arch_branch}"
          for platform in "${platforms[@]}"; do
            docker pull --platform "${platform}" "${registry_local}/${repo_dockerhub}:${tag_repo}"
            docker rm -f "${container_name}" >/dev/null 2>&1 || true
            docker run \
              --name "${container_name}" \
              --rm \
              --detach \
              --platform "${platform}" \
              "${registry_local}/${repo_dockerhub}:${tag_repo}"

            dir_step="test"
            if [[ -d "${dir_step}" ]]; then
              cd "./${dir_step}"
              echo "Changed to directory: $(pwd)"

              set +e
              shopt -s nullglob
              log_container=$(mktemp)
              for script_file in ./*.sh; do
                container_script="${dir_container}/$(basename "${script_file}")"
                script_temp=$(mktemp)
                {
                  echo "#!/bin/sh"
                  printenv | awk -F= '/^[a-zA-Z_][a-zA-Z0-9_]*=/ {printf "%s=\"%s\"\n", $1, $2}'
                  cat "${script_file}"
                } > "${script_temp}"

                docker cp "${script_temp}" "${container_name}:${container_script}"
                docker exec -u 0 "${container_name}" chmod +x "${container_script}"
                docker exec -u 0 "${container_name}" sh -c "${container_script}" | tee -a "${log_container}"
              done
              set -e
            else
              echo "No directory found"
            fi

            echo "Sleep for ${time_sleep} seconds"
            sleep "${time_sleep}"
            docker logs "${container_name}" || true
            docker stop "${container_name}" || true
          done

          echo "status=success" | tee -a "${GITHUB_OUTPUT}"

      - name: (Log in) to Docker Hub
        id: login
        if: steps.build.outputs.status == 'success' && !cancelled()
        working-directory: /
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login docker.io --username "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          echo "status=success" | tee -a "${GITHUB_OUTPUT}"

      - name: (Push) Image to ${{ env.registry_push }}
        id: push
        if: steps.login.outputs.status == 'success' && !cancelled()
        continue-on-error: true
        working-directory: ${{ env.PATH_app }}
        run: |
          echo "Current working directory: $(pwd)"

          declare -a tag_array=("${tag_repo}")
          tag_version="${tag_repo}-${version}"
          registry_copy_image="quay.io/skopeo/stable:latest"

          dir_step="push"
          if [[ -d "${dir_step}" ]]; then
            cd "./${dir_step}"
            echo "Changed to directory: $(pwd)"

            shopt -s nullglob
            for script_file in ./*.sh; do
              chmod +x "${script_file}"
              source "${script_file}"
            done
          else
            echo "No directory found"
          fi

          if [[ "${consistent}" == "true" && -n "${tag_version}" ]]; then
            tag_array+=("${tag_version}")
          fi

          docker pull "${registry_copy_image}"
          if ! docker run --rm --network host curlimages/curl:8.12.1 -fsS --connect-timeout 2 "${registry_local_probe}" >/dev/null; then
            echo "::error::Local registry is not reachable at ${registry_local_probe} from helper container"
            exit 1
          fi

          source_ref="docker://${registry_local}/${repo_dockerhub}:${tag_repo}"
          IFS=',' read -ra registries <<< "${registry_push}"
          for registry_remote in "${registries[@]}"; do
            for tag_each in "${tag_array[@]}"; do
              dest_ref="docker://${registry_remote}/${repo_dockerhub}:${tag_each}"
              copy_args=(
                copy
                --all
                --retry-times 3
                --src-tls-verify=false
              )
              if [[ "${registry_remote}" == "docker.io" ]]; then
                copy_args+=(--dest-creds "${{ secrets.DOCKER_USERNAME }}:${{ secrets.DOCKER_PASSWORD }}")
              fi

              # buildx imagetools create 会在 job container 侧解析 127.0.0.1，这里改成 host-network helper 容器访问 daemon-facing local registry。
              docker run --rm --network host "${registry_copy_image}" "${copy_args[@]}" "${source_ref}" "${dest_ref}" || echo "Failed to push ${tag_each} to ${registry_remote}, but continuing..."
            done
          done

          echo "status=success" | tee -a "${GITHUB_OUTPUT}"

      - name: (Output) Save
        id: output
        if: steps.build.outputs.status == 'success' && !cancelled()
        working-directory: ${{ env.PATH_app }}
        run: |
          echo "Current working directory: $(pwd)"

          mkdir -p "${PATH_output}"

          target_ext="tar"
          IFS=',' read -ra platforms <<< "${arch_branch}"
          for platform in "${platforms[@]}"; do
            target_file="${app_branch}_${tag_repo}_${version}_$(echo "${platform}" | tr '/' '_').${target_ext}"

            docker pull --platform "${platform}" "${registry_local}/${repo_dockerhub}:${tag_repo}"
            docker tag "${registry_local}/${repo_dockerhub}:${tag_repo}" "${repo_dockerhub}:${tag_repo}"
            docker save --output "${PATH_output}/${target_file}" "${repo_dockerhub}:${tag_repo}"

            echo "Exported ${platform} image to ${target_file}"
          done
          ls -lh "${PATH_output}"

          echo "target_ext=${target_ext}" | tee -a "${GITHUB_OUTPUT}"
          echo "status=success" | tee -a "${GITHUB_OUTPUT}"

      - name: (Optimize) Free Disk Before Compress
        id: optimize-disk
        if: ${{ steps.output.outputs.status == 'success' && steps.env-validate.outputs.compress == 'true' && (env.app_branch == 'stable-diffusion-webui-amdgpu' || env.app_branch == 'sdnext') }}
        working-directory: /
        run: |
          echo "Current working directory: $(pwd)"
          docker system df || true
          docker image prune --all --force || true
          docker builder prune --all --force || true
          docker system df || true
          df -hT

      - name: (Output) Compress
        id: output-compress
        if: steps.output.outputs.status == 'success' && steps.env-validate.outputs.compress == 'true' && !cancelled()
        uses: Grinch27/github-actions/.github/actions/compress-xz@main
        with:
          path_target: ${{ env.PATH_output }}
          pattern_match: '^\./.*\.${{ steps.output.outputs.target_ext }}$'

      - name: (Output) Split
        id: output-split
        if: steps.output.outputs.status == 'success' && steps.env-validate.outputs.compress == 'true' && !cancelled()
        uses: Grinch27/github-actions/.github/actions/file-split@main
        with:
          path_target: ${{ env.PATH_output }}
          pattern_match: '^\./.*\.${{ steps.output.outputs.target_ext }}\.xz$'
          split_size: "1900M"

      - name: (Output) Check
        id: output-check
        if: steps.output.outputs.status == 'success' && !cancelled()
        env:
          category: "files"
          compress_enabled: ${{ steps.env-validate.outputs.compress }}
        working-directory: ${{ env.PATH_output }}
        run: |
          echo -e "Current working directory: $(pwd)"
          ls -lh ./

          metadata='{"${{ env.category }}":[]}'
          while IFS= read -r -d '' file; do
            relative_path="${file#./}"
            checksum=$(sha256sum "${relative_path}" | awk '{print $1}')
            filename=$(basename "${relative_path}")
            metadata=$(jq \
              --arg filename "${filename}" \
              --arg checksum "${checksum}" \
              '.${{ env.category }} += [{filename: $filename, checksum: $checksum}]' <<< "${metadata}")
          done < <(
            if [[ "${compress_enabled}" == 'true' ]]; then
              find . -maxdepth 2 -type f \( -name '*.xz' -o -name '*.xz.part*' \) -print0 | sort -z
            else
              find . -maxdepth 1 -type f -name '*.tar*' -print0 | sort -z
            fi
          )
          echo "${metadata}" | jq . > "${PATH_metadata_sum}"

          echo "timestamp=$(date +"%y%mw%V")" | tee -a "${GITHUB_OUTPUT}"
          echo "PATH_metadata_sum=${PATH_metadata_sum}" | tee -a "${GITHUB_OUTPUT}"
          echo "status=success" | tee -a "${GITHUB_OUTPUT}"

      - name: "[release.md] Record release.md"
        id: release-md
        if: steps.output-check.outputs.status == 'success' && !cancelled()
        working-directory: ${{ env.PATH_app }}
        run: |
          printf "Current working directory: %s\n" "$(pwd)"

          PATH_release_dir=$(dirname "${PATH_release}")
          mkdir -p "${PATH_release_dir}"
          : > "${PATH_release}"

          set +e
          record_to_markdown() {
            local title="$1"
            local content="$2"
            local code_block="${3:-}"
            local format="\n### %s\n%s\n"

            if [[ -n "${code_block}" ]]; then
              format="\n### %s\n\n<details>\n<summary>%s</summary>\n\n\`\`\`%s\n%s\n\`\`\`\n\n</details>\n"
              printf "${format}" "${title}" "${title}" "${code_block}" "${content}" | tee -a "${PATH_release}"
            else
              printf "${format}" "${title}" "${content}" | tee -a "${PATH_release}"
            fi
          }

          record_to_markdown "Target" "- [x] ${app_branch} - ${tag_repo}"
          record_to_markdown "Version" "- [x] ${version}"
          record_to_markdown "Repository" "- [x] ${repo_dockerhub}"
          record_to_markdown "Base Image" "- [x] ${base_image}"
          record_to_markdown "Timestamp" "- [x] $(date +"%Y-%m-%d %H:%M:%S %z")"

          IFS=',' read -ra registries <<< "${registry_push}"
          for registry_remote in "${registries[@]}"; do
            info_content=$(printf '%s\n%s\n%s\n%s\n%s\n' \
              "- [x] Registry: ${registry_remote}" \
              "- [x] Repository: ${repo_dockerhub}" \
              "- [x] Pull: docker pull ${registry_remote}/${repo_dockerhub}:*" \
              "- [x] Load xz: xz --decompress --verbose *.xz && docker load < *.tar" \
              "- [x] Load tar: docker load < *.tar")
            record_to_markdown "Info (${registry_remote})" "${info_content}"
          done

          split_content=$(printf '%s\n%s\n%s\n' \
            'cat file-split/image.tar.xz.part* > image.tar.xz' \
            'xz --decompress --verbose image.tar.xz' \
            'docker load < image.tar')
          record_to_markdown "Split Assets" "${split_content}" "bash"

          sum_json_content=$(jq '.' "${PATH_metadata_sum}")
          record_to_markdown "sha256sum" "${sum_json_content}" "json"

          cat "${PATH_release}"
          set -e

          echo "status=success" | tee -a "${GITHUB_OUTPUT}"

      - name: (Upload) to Release
        id: upload-release
        if: steps.release-md.outputs.status == 'success' && !cancelled()
        uses: ncipollo/release-action@main
        with:
          name: "${{ steps.env-validate.outputs.repo_dockerhub }}"
          tag: "${{ env.app_branch }}"
          artifacts: "${{ env.PATH_output }}/**"
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          token: "${{ secrets.GITHUB_TOKEN }}"
          bodyFile: "${{ env.PATH_release }}"

      # ========== Build / Publish: End ==========
