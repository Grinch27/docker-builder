# sudo docker compose -f /home/user/github/docker-builder/application/stable-diffusion-webui-amdgpu/test/sd.yml up -d
# sudo docker compose -f /home/user/github/docker-builder/application/stable-diffusion-webui-amdgpu/test/sd.yml down
services:
  sd-webui:
    image: grinch27/stable-diffusion-webui-amdgpu:latest
    container_name: stable-diffusion-webui-amdgpu
    restart: unless-stopped
    network_mode: host
    dns:
      - "127.0.0.1"
      - "::1"
    privileged: false
    # ports:
    #   - "7860:7860"
    environment:
      COMMANDLINE_ARGS: "--listen --port 7860 --skip-torch-cuda-test --skip-ort --skip-version-check --medvram --disable-opt-split-attention --skip-load-model-at-start --enable-insecure-extension-access"
      NO_TCMALLOC: "True"
      PYTHONWARNINGS: "ignore::FutureWarning,ignore::DeprecationWarning,ignore::SyntaxWarning"
      HSA_OVERRIDE_GFX_VERSION: "11.0.0"
      HSA_ENABLE_SDMA: "0"
      PYTORCH_HIP_ALLOC_CONF: "expandable_segments:True"
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
    entrypoint:
      - /usr/bin/tini
      - --
      - /bin/bash
      - -lc
      - >-
        git -C /opt/stable-diffusion-webui fetch --tags --depth=1 >/dev/null 2>&1 || true;
        if ! grep -q 'webui.sh -f' /usr/local/bin/entrypoint.sh; then
          sed -i 's#exec bash ./webui.sh#exec bash ./webui.sh -f#' /usr/local/bin/entrypoint.sh;
        fi;
        exec /usr/local/bin/entrypoint.sh
    # shm_size: "8gb"
    # volumes:
    #   - ./data/models:/data/models
    #   - ./data/outputs:/data/outputs
